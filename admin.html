<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Admin Dashboard</h1>
    <p>Village Complaint Management</p>
</header>

<main class="admin-layout">

    <section class="dashboard-stats">

        <div class="stat-card">
            <h3>Total Complaints</h3>
            <h2 id="totalComplaints">0</h2>
        </div>

        <div class="stat-card">
            <h3>Pending</h3>
            <h2 id="pendingComplaints">0</h2>
        </div>

        <div class="stat-card">
            <h3>In Progress</h3>
            <h2 id="progressComplaints">0</h2>
        </div>

        <div class="stat-card">
            <h3>Resolved</h3>
            <h2 id="resolvedComplaints">0</h2>
        </div>

    </section>

    <div class="search-bar">

    <input
        type="text"
        id="searchInput"
        placeholder="🔍 Search by Complaint ID, Name or Category..."
        onkeyup="filterComplaints()"
    >

    <select id="statusFilter" onchange="filterComplaints()">
        <option value="All">All Status</option>
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Resolved">Resolved</option>
    </select>

</div>

    <h2 class="section-title">All Complaints</h2>

    <section id="adminContainer"></section>

</main>

<script src="script.js"></script>

</body>
</html>
