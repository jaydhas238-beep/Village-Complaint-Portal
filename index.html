<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Village Complaint Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>GramSahay</h1>
    <p>Village Complaint Portal</p>
</header>

<main>
    <section class="complaint-form">
        <h2>Register a Complaint</h2>

        <form id="complaintForm">

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>

            <label for="mobile">Mobile Number</label>
            <input type="tel" id="mobile" placeholder="Enter mobile number" required>

            <label for="category">Complaint Category</label>
            <select id="category" required>
                <option value="">Select Category</option>
                <option>Road Damage</option>
                <option>Water Supply</option>
                <option>Street Lights</option>
                <option>Garbage</option>
                <option>Drainage</option>
                <option>Electricity</option>
                <option>Other</option>
            </select>

            <label for="description">Complaint Description</label>
            <textarea id="description" rows="5" placeholder="Describe the issue..." required></textarea>

            <label for="photo">Upload Photo</label>
            <input type="file" id="photo" accept="image/*" required>

            <button type="submit">Submit Complaint</button>


            <br><br>
<a href="complaints.html">
    <button type="button">View Complaints</button>
</a>

            <br><br>

<a href="track.html">
    <button type="button">Track Complaint</button>
</a>

<br><br>

<a href="admin.html">
    <button type="button">Admin Dashboard</button>
</a>

<br><br>

<a href="complaints.html">
    <button type="button">View All Complaints</button>
</a>
        </form>
    </section>
</main>
    <script src="script.js"></script>
</body>
